version: '3.8'

services:
  volleyball-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: volleyball-bot
    restart: unless-stopped
    environment:
      - TZ=Europe/Moscow
      - DOTNET_ENVIRONMENT=Production
      # Override config with environment variables
      - BotToken=${BOT_TOKEN}
      - AdminTelegramIds=${ADMIN_TELEGRAM_IDS}
      - Proxy__Url=${PROXY_URL}
      - Proxy__Username=${PROXY_USERNAME}
      - Proxy__Password=${PROXY_PASSWORD}
    volumes:
      # Persist database
      - volleyball-data:/app/data
      # Mount custom config (optional)
      - ./appsettings.Production.json:/app/appsettings.json:ro
    networks:
      - volleyball-network
    healthcheck:
      test: ["CMD", "dotnet", "VolleyballBot.dll", "--health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  volleyball-data:
    driver: local

networks:
  volleyball-network:
    driver: bridge
