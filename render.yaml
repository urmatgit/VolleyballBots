services:
  # Telegram Bot Service
  - type: web
    name: volleyball-bot
    env: dotnet
    region: frankfurt
    plan: starter
    branch: main
    rootDir: VolleyballBot
    buildCommand: dotnet publish -c Release -o /opt/render/project/src
    startCommand: dotnet VolleyballBot.dll
    
    # Environment variables
    envVars:
      - key: DOTNET_ENVIRONMENT
        value: Production
      - key: BotToken
        sync: false
      - key: AdminTelegramIds
        sync: false
      - key: ConnectionStrings__DefaultConnection
        value: Data Source=/opt/render/project/src/data/volleyball.db
      - key: Proxy__Url
        sync: false
      - key: Proxy__Username
        sync: false
      - key: Proxy__Password
        sync: false
    
    # Persistent disk for database
    disks:
      - name: volleyball-data
        mountPath: /opt/render/project/src/data
        sizeGB: 1
    
    # Health check
    healthCheckPath: /health
    
    # Auto-deploy
    autoDeploy: true
