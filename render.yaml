services:
  # Telegram Bot - Background Worker
  - type: web
    name: volleyball-bot
    env: docker
    region: frankfurt
    plan: starter
    branch: main
    rootDir: VolleyballBot
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    
    # Environment variables
    envVars:
      - key: DOTNET_ENVIRONMENT
        value: Production
      - key: BotToken
        sync: false
      - key: AdminTelegramIds
        sync: false
      - key: ConnectionStrings__DefaultConnection
        value: Data Source=/opt/render/project/src/data/volleyball.db
      - key: TZ
        value: Europe/Moscow
    
    # Persistent disk for database
    disks:
      - name: volleyball-data
        mountPath: /data
        sizeGB: 1
    
    # Health check
    healthCheckPath: /health
    healthCheckInterval: 30s
    healthCheckTimeout: 5s
    healthCheckRetries: 3
    
    # Auto-deploy и restart
    autoDeploy: true
    restartPolicy: always
    
    # Resources
    numInstances: 1
